name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      scheme:
        description: "scheme"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - rootless
          - rootful
          - roothide

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: set matrix
        id: set-matrix
        run: |
          SCHEME="${{ github.event.inputs.scheme }}"
          if [ -z "$SCHEME" ] || [ "$SCHEME" = "all" ]; then
            echo 'matrix=["rootless","rootful","roothide"]' >> $GITHUB_OUTPUT
          else
            echo "matrix=[\"$SCHEME\"]" >> $GITHUB_OUTPUT
          fi

  build:
    needs: setup
    runs-on: macos-latest
    strategy:
      matrix:
        scheme: ${{ fromJson(needs.setup.outputs.matrix) }}
      fail-fast: false

    env:
      DEVICE_TARGET: "iphone:clang:latest:16.0"

    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: setup theos
        uses: actions/checkout@v4
        with:
          repository: roothide/theos
          path: theos
          submodules: recursive

      - name: cache sdks
        id: cache-sdks
        uses: actions/cache@v4
        with:
          path: theos/sdks
          key: theos-sdks-16.5

      - name: download sdks
        if: steps.cache-sdks.outputs.cache-hit != 'true'
        run: |
          curl -LO https://github.com/theos/sdks/archive/master.zip
          unzip -q master.zip
          mkdir -p theos/sdks
          mv sdks-master/*.sdk theos/sdks/
          rm -rf master.zip sdks-master

      - name: set THEOS env var
        run: echo "THEOS=$GITHUB_WORKSPACE/theos" >> $GITHUB_ENV

      - name: install deps
        run: |
          brew install ldid make
          echo "$(brew --prefix make)/libexec/gnubin" >> $GITHUB_PATH

      - name: build (${{ matrix.scheme }})
        run: |
          SCHEME_FLAG=""
          if [ "${{ matrix.scheme }}" = "rootless" ]; then
            SCHEME_FLAG="THEOS_PACKAGE_SCHEME=rootless"
          elif [ "${{ matrix.scheme }}" = "roothide" ]; then
            SCHEME_FLAG="THEOS_PACKAGE_SCHEME=roothide"
          fi
          make clean
          make package \
            ARCHS="arm64 arm64e" \
            TARGET="$DEVICE_TARGET" \
            FINALPACKAGE=1 \
            $SCHEME_FLAG

      - name: upload package (${{ matrix.scheme }})
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.scheme }}-package
          path: packages/*.deb

  release:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./all-packages
          pattern: "*-package"
          merge-multiple: true

      - name: update nightly release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "./all-packages/*.deb"
          allowUpdates: true
          tag: nightly
          name: "deb"
          body: |
            This build was automatically generated from the latest commit on `main`.
            
            **Commit SHA:** ${{ github.sha }}
            **Triggered by:** @${{ github.actor }}
            
            > [!NOTE]
            > This prototype tweak will forever stay on version `0.0.1`.
          token: ${{ secrets.GITHUB_TOKEN }}
